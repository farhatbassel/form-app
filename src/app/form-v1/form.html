<h1> Reactive Forms </h1>

<form [formGroup]="formGroup">
  <div class="input-wrapper">
    <app-input [label]="'Username'" [formControlName]="'username'" [type]="'text'"/>
  </div>
  <div class="input-wrapper">
    <app-input [label]="'Password'" [formControlName]="'password'" [type]="'password'"/>
  </div>
  <div class="input-wrapper">
    <app-input [label]="'Reenter Password'" [formControlName]="'recheckPassword'" [type]="'password'"/>
  </div>
</form>

@if (formGroup.dirty) {
  @if (formGroup.invalid){
    <h3 class="error-message">
      Form is invalid
    </h3>
  } @else {
    <h3 class="success-message">
      Form is valid
    </h3>
  }
}

<button class="submit" (click)="onSubmit()">Submit</button>
